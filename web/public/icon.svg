<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#3b82f6" stroke-width="0.5" opacity="0.3">
    <line x1="128" y1="64" x2="128" y2="448"/>
    <line x1="256" y1="64" x2="256" y2="448"/>
    <line x1="384" y1="64" x2="384" y2="448"/>
    <line x1="64" y1="128" x2="448" y2="128"/>
    <line x1="64" y1="256" x2="448" y2="256"/>
    <line x1="64" y1="384" x2="448" y2="384"/>
  </g>

  <!-- Traces (connections between nodes) -->
  <g stroke="#3b82f6" stroke-width="2.5" opacity="0.6" fill="none">
    <!-- Row connections -->
    <line x1="128" y1="128" x2="256" y2="128"/>
    <line x1="256" y1="128" x2="384" y2="128"/>
    <line x1="128" y1="256" x2="256" y2="256"/>
    <line x1="256" y1="256" x2="384" y2="256"/>
    <line x1="128" y1="384" x2="256" y2="384"/>
    <line x1="256" y1="384" x2="384" y2="384"/>
    <!-- Column connections -->
    <line x1="128" y1="128" x2="128" y2="256"/>
    <line x1="128" y1="256" x2="128" y2="384"/>
    <line x1="256" y1="128" x2="256" y2="256"/>
    <line x1="256" y1="256" x2="256" y2="384"/>
    <line x1="384" y1="128" x2="384" y2="256"/>
    <line x1="384" y1="256" x2="384" y2="384"/>
    <!-- Diagonal traces -->
    <line x1="128" y1="128" x2="256" y2="256"/>
    <line x1="256" y1="256" x2="384" y2="384"/>
  </g>

  <!-- Regular nodes -->
  <g fill="#3b82f6">
    <circle cx="256" cy="128" r="10"/>
    <circle cx="384" cy="128" r="10"/>
    <circle cx="128" cy="256" r="10"/>
    <circle cx="384" cy="256" r="10"/>
    <circle cx="128" cy="384" r="10"/>
    <circle cx="256" cy="384" r="10"/>
  </g>

  <!-- Active nodes (top-left, center, bottom-right) with glow -->
  <g filter="url(#glow)">
    <circle cx="128" cy="128" r="16" fill="#3b82f6"/>
    <circle cx="128" cy="128" r="6" fill="white"/>
    <circle cx="256" cy="256" r="16" fill="#3b82f6"/>
    <circle cx="256" cy="256" r="6" fill="white"/>
    <circle cx="384" cy="384" r="16" fill="#3b82f6"/>
    <circle cx="384" cy="384" r="6" fill="white"/>
  </g>
</svg>
